<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎁 Sorpresa</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --pink:#ff2d78; --gold:#ffd700; --cyan:#00f5ff;
      --purple:#bf00ff; --orange:#ff6a00; --green:#00ff88;
    }
    html,body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Bebas Neue',sans-serif; }

    /* ── STARS ── */
    #stars { position:fixed; inset:0; z-index:0; pointer-events:none; }

    /* ── SCENE ── */
    #scene {
      position:fixed; inset:0; z-index:1;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:22px;
      transition:opacity 0.4s ease;
    }

    #titulo {
      font-size:clamp(14px,2.5vw,34px);
      color:#444; letter-spacing:8px;
      animation:titlePulse 2.5s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%,100%{color:#333;text-shadow:none;}
      50%{color:#777;text-shadow:0 0 20px #555;}
    }

    /* ── CONTADOR ── */
    #contador-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
    #contador-label { font-size:clamp(11px,1.8vw,18px); color:#555; letter-spacing:4px; }

    #barra-track {
      width:clamp(180px,38vw,480px); height:14px;
      background:#111; border-radius:20px;
      border:1px solid #2a2a2a; overflow:hidden;
      box-shadow:0 0 10px #0009;
    }
    #barra-fill {
      height:100%; width:0%;
      border-radius:20px;
      background:linear-gradient(90deg,var(--purple),var(--pink),var(--gold));
      box-shadow:0 0 18px var(--pink);
      transition:width 0.3s cubic-bezier(.17,.67,.35,1.3);
    }

    #num-contador {
      font-size:clamp(26px,5.5vw,76px);
      color:#fff; line-height:1;
      text-shadow:0 0 30px var(--pink),0 0 60px var(--purple);
    }
    #num-contador.bump { animation:bumpNum 0.28s ease-out; }
    @keyframes bumpNum {
      0%{transform:scale(1);}
      40%{transform:scale(1.6) rotate(-6deg);}
      100%{transform:scale(1) rotate(0);}
    }

    /* ── GIFT ── */
    #gift-wrapper {
      position:relative; cursor:pointer;
      user-select:none; -webkit-tap-highlight-color:transparent;
      animation:floatGift 3.5s ease-in-out infinite;
    }
    @keyframes floatGift {
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-26px);}
    }
    #gift-wrapper.shake {
      animation:floatGift 3.5s ease-in-out infinite, shakeGift 0.28s ease-out;
    }
    @keyframes shakeGift {
      0%{transform:translateY(0) rotate(0) scale(1);}
      20%{transform:translateY(-12px) rotate(-9deg) scale(1.12);}
      40%{transform:translateY(5px) rotate(8deg) scale(0.93);}
      60%{transform:translateY(-7px) rotate(-5deg) scale(1.08);}
      80%{transform:translateY(3px) rotate(3deg) scale(1.03);}
      100%{transform:translateY(0) rotate(0) scale(1);}
    }

    #gift-emoji {
      font-size:clamp(100px,20vw,260px);
      display:block; line-height:1;
      animation:glowCycle 2s ease-in-out infinite;
    }
    @keyframes glowCycle {
      0%,100%{filter:drop-shadow(0 0 40px var(--pink)) drop-shadow(0 0 90px var(--purple)) drop-shadow(0 0 160px var(--cyan));}
      50%{filter:drop-shadow(0 0 70px var(--gold)) drop-shadow(0 0 140px var(--orange)) drop-shadow(0 0 220px var(--pink));}
    }

    #gift-wrapper::before {
      content:''; position:absolute; inset:-30px; border-radius:50%;
      background:conic-gradient(var(--pink),var(--gold),var(--cyan),var(--purple),var(--orange),var(--pink));
      filter:blur(28px); opacity:0.38;
      animation:ringRot 3s linear infinite; z-index:-1;
    }
    @keyframes ringRot { to{transform:rotate(360deg);} }

    .ripple {
      position:absolute; border-radius:50%; pointer-events:none;
      background:radial-gradient(circle,var(--gold),var(--pink),transparent);
      transform:translate(-50%,-50%) scale(0);
      animation:rippleAnim 0.6s ease-out forwards; z-index:10;
    }
    @keyframes rippleAnim { to{transform:translate(-50%,-50%) scale(5);opacity:0;} }

    #hint {
      font-size:clamp(11px,1.7vw,18px); color:#444; letter-spacing:4px;
      animation:blinkHint 1.8s ease-in-out infinite;
    }
    @keyframes blinkHint { 0%,100%{opacity:0.12;} 50%{opacity:0.65;} }

    /* ═══ EFECTOS EXPLOSIÓN ═══ */
    #flash { position:fixed;inset:0;z-index:50;background:#fff;opacity:0;pointer-events:none; }
    #flash.boom { animation:flashAnim 0.35s ease-out forwards; }
    @keyframes flashAnim { 0%{opacity:1;} 100%{opacity:0;} }

    #rainbow-bg {
      position:fixed;inset:0;z-index:55;
      background:conic-gradient(#ff0000,#ff7700,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000);
      opacity:0; pointer-events:none;
      transform:scale(0);
      transition:transform 0.5s cubic-bezier(.17,.67,.35,1.4),opacity 0.4s;
    }
    #rainbow-bg.visible { opacity:0.88; transform:scale(1); animation:hueRot 0.45s linear infinite; }
    @keyframes hueRot { to{filter:hue-rotate(360deg);} }

    #particles { position:fixed;inset:0;z-index:60;pointer-events:none;opacity:0;transition:opacity 0.3s; }
    #particles.visible { opacity:1; }

    .shockwave {
      position:fixed;z-index:65;border-radius:50%;
      border:8px solid rgba(255,255,255,0.9);pointer-events:none;
      top:50%;left:50%;width:0;height:0;
      transform:translate(-50%,-50%);
      animation:shockAnim 1.2s ease-out forwards;
    }
    @keyframes shockAnim { to{width:360vw;height:360vw;opacity:0;border-width:0;} }

    .rain-emoji {
      position:fixed;z-index:70;pointer-events:none;top:-70px;
      animation:rainDown linear forwards;
    }
    @keyframes rainDown { to{transform:translateY(115vh) rotate(1080deg);opacity:0;} }

    .fly-text {
      position:fixed;z-index:72;pointer-events:none;
      font-family:'Bebas Neue',sans-serif;
      text-shadow:0 0 20px currentColor,0 0 40px currentColor;
      white-space:nowrap;
      animation:flyAnim linear forwards;
    }
    @keyframes flyAnim { to{transform:translate(var(--tx),var(--ty)) scale(0.05);opacity:0;} }

    .laser {
      position:fixed;z-index:63;pointer-events:none;
      height:4px;top:50%;left:50%;
      transform-origin:left center; border-radius:4px;
      animation:laserAnim 0.9s ease-out forwards;
    }
    @keyframes laserAnim { from{width:0;opacity:1;} to{width:110vw;opacity:0;} }

    #zoom-burst {
      position:fixed;inset:0;z-index:58;pointer-events:none;
      background:radial-gradient(circle,#fff 0%,transparent 70%);
      opacity:0;
    }
    #zoom-burst.go { animation:zoomBurstAnim 1.1s ease-out forwards; }
    @keyframes zoomBurstAnim { 0%{opacity:0.95;transform:scale(0.1);} 100%{opacity:0;transform:scale(3.5);} }

    #strobe { position:fixed;inset:0;z-index:56;pointer-events:none;background:#fff;opacity:0; }

    /* spinner de disco */
    #disco {
      position:fixed; z-index:62; pointer-events:none;
      top:50%; left:50%; width:120vw; height:120vw;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:conic-gradient(transparent,rgba(255,255,255,0.15),transparent,rgba(255,200,0,0.12),transparent);
      opacity:0;
      animation:discoSpin 0.4s linear infinite;
    }
    #disco.visible { opacity:1; }
    @keyframes discoSpin { to{transform:translate(-50%,-50%) rotate(360deg);} }

    /* ═══ MENSAJE FINAL ═══ */
    #mensaje-panel {
      position:fixed;inset:0;z-index:90;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
      pointer-events:none;opacity:0;transition:opacity 0.5s;
    }
    #mensaje-panel.visible { pointer-events:all;opacity:1; }

    #mensaje-text {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(28px,8vw,115px);
      text-align:center;line-height:1.1;color:#fff;
      padding:10px 30px;
      text-shadow:0 0 20px var(--pink),0 0 60px var(--gold),0 0 120px var(--cyan),
                  6px 6px 0 #000,-4px -4px 0 #000;
      opacity:0;transform:scale(0.1) rotate(-15deg);
      letter-spacing:3px;max-width:92vw;
    }
    #mensaje-text.show {
      animation:mensajeEntrada 0.75s cubic-bezier(.17,.67,.35,1.5) forwards,
                mensajeVibra 0.45s ease-in-out 0.75s infinite alternate;
    }
    @keyframes mensajeEntrada { to{opacity:1;transform:scale(1) rotate(0);} }
    @keyframes mensajeVibra {
      from{transform:scale(1) rotate(-1.5deg) skewX(-1deg);}
      to{transform:scale(1.05) rotate(1.5deg) skewX(1deg);}
    }

    #sub-text {
      font-family:'Permanent Marker',cursive;
      font-size:clamp(14px,2.5vw,34px);color:var(--gold);
      text-align:center;text-shadow:0 0 20px var(--gold),0 0 40px var(--orange);
      opacity:0;transform:translateY(22px);
      transition:opacity 0.55s ease,transform 0.55s ease;
      max-width:82vw;
    }
    #sub-text.show { opacity:1;transform:translateY(0); }

    #btn-volver {
      background:transparent;border:3px solid #fff;color:#fff;
      font-family:'Bebas Neue',sans-serif;font-size:22px;
      letter-spacing:5px;padding:14px 44px;cursor:pointer;border-radius:60px;
      opacity:0;transform:translateY(30px);
      transition:opacity 0.5s ease,transform 0.5s ease,background 0.2s,color 0.2s,box-shadow 0.2s;
    }
    #btn-volver.show { opacity:1;transform:translateY(0); }
    #btn-volver:hover { background:#fff;color:#000;transform:scale(1.08);box-shadow:0 0 40px #fffa; }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="scene">
  <div id="titulo">✦ Alguien tiene algo para ti ✦</div>

  <div id="contador-wrap">
    <div id="contador-label">Dale click al regalo</div>
    <div id="barra-track"><div id="barra-fill"></div></div>
    <div id="num-contador">0 / 10</div>
  </div>

  <div id="gift-wrapper">
    <span id="gift-emoji">🎁</span>
  </div>

  <div id="hint">— toca el regalo —</div>
</div>

<div id="flash"></div>
<div id="strobe"></div>
<div id="zoom-burst"></div>
<div id="rainbow-bg"></div>
<div id="disco"></div>
<canvas id="particles"></canvas>

<div id="mensaje-panel">
  <div id="mensaje-text">🎉 ¡SORPRESA! 🎉<br>ERES LO MEJOR<br>DEL MUNDO 🌟</div>
  <div id="sub-text">✨ Gracias por existir ✨</div>
  <button id="btn-volver" onclick="resetear()">← Volver a empezar</button>
</div>

<script>
/* ── STARS ── */
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  let stars=[];
  function resize(){
    c.width=window.innerWidth;c.height=window.innerHeight;
    stars=Array.from({length:260},()=>({
      x:Math.random()*c.width,y:Math.random()*c.height,
      r:Math.random()*1.8+0.2,a:Math.random(),
      da:(Math.random()*0.008+0.003)*(Math.random()<.5?1:-1)
    }));
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(const s of stars){
      s.a+=s.da; if(s.a<=0||s.a>=1)s.da*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();draw();
})();

/* ── PARTÍCULAS ── */
const pc=document.getElementById('particles'),pctx=pc.getContext('2d');
let parts=[],animating=false;
function resizePC(){pc.width=window.innerWidth;pc.height=window.innerHeight;}
window.addEventListener('resize',resizePC);resizePC();

function spawnParts(n=420){
  const cols=['#ff2d78','#ffd700','#00f5ff','#bf00ff','#ff6a00','#ffffff','#00ff88','#ff69b4','#fff700'];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=Math.random()*28+5;
    parts.push({
      x:pc.width/2,y:pc.height/2,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-Math.random()*14,
      r:Math.random()*9+3,
      color:cols[Math.floor(Math.random()*cols.length)],
      alpha:1,gravity:0.42,
      shape:Math.random()<0.5?'circle':'rect',
      rot:Math.random()*Math.PI*2,rotv:(Math.random()-0.5)*0.35
    });
  }
}

function drawParts(){
  if(!animating)return;
  pctx.clearRect(0,0,pc.width,pc.height);
  parts=parts.filter(p=>p.alpha>0.012);
  for(const p of parts){
    p.vy+=p.gravity;p.x+=p.vx;p.y+=p.vy;
    p.alpha-=0.005;p.rot+=p.rotv;
    pctx.save();
    pctx.globalAlpha=Math.max(0,p.alpha);
    pctx.translate(p.x,p.y);pctx.rotate(p.rot);
    pctx.fillStyle=p.color;pctx.shadowBlur=18;pctx.shadowColor=p.color;
    if(p.shape==='circle'){pctx.beginPath();pctx.arc(0,0,p.r,0,Math.PI*2);pctx.fill();}
    else pctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
    pctx.restore();
  }
  requestAnimationFrame(drawParts);
}

/* ── HELPERS ── */
const emojis=['🎉','✨','🎊','💥','⭐','🌟','💫','🎈','🔥','💎','🌈','🎁','❤️','🍭','🏆','🦄','🍾','🎆','🎇','🥳','🎵','🎶'];

function lluvia(n=70,delay=0){
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('span');
      el.className='rain-emoji';
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left=Math.random()*100+'vw';
      el.style.fontSize=(22+Math.random()*52)+'px';
      const dur=1.5+Math.random()*2.8;
      el.style.animationDuration=dur+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),dur*1000+200);
    },delay+i*50);
  }
}

function shock(d=0,color='rgba(255,255,255,0.9)'){
  setTimeout(()=>{
    const el=document.createElement('div');
    el.className='shockwave';el.style.borderColor=color;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1400);
  },d);
}

function laser(angle,color,delay=0){
  setTimeout(()=>{
    const el=document.createElement('div');
    el.className='laser';
    el.style.background=`linear-gradient(90deg,${color},transparent)`;
    el.style.transform=`rotate(${angle}deg)`;
    el.style.boxShadow=`0 0 14px ${color}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  },delay);
}

function flyWord(text,color,delay=0){
  setTimeout(()=>{
    const el=document.createElement('div');
    el.className='fly-text';el.textContent=text;el.style.color=color;
    el.style.fontSize=(28+Math.random()*56)+'px';
    el.style.left=Math.random()*80+10+'vw';
    el.style.top=Math.random()*80+10+'vh';
    el.style.setProperty('--tx',(Math.random()-0.5)*700+'px');
    el.style.setProperty('--ty',(Math.random()-0.5)*700+'px');
    const dur=1.8+Math.random();
    el.style.animationDuration=dur+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),dur*1000+100);
  },delay);
}

let strobeTimer=null;
function startStrobe(dur=4000){
  const s=document.getElementById('strobe');
  let on=false;
  strobeTimer=setInterval(()=>{on=!on;s.style.opacity=on?'0.16':'0';},75);
  setTimeout(()=>{clearInterval(strobeTimer);s.style.opacity='0';},dur);
}

/* ── CONTADOR ── */
const MAX=10;
let clicks=0,locked=false;
const giftWrap=document.getElementById('gift-wrapper');
const numEl=document.getElementById('num-contador');
const barraFill=document.getElementById('barra-fill');
const hintEl=document.getElementById('hint');

giftWrap.addEventListener('click',onGiftClick);

function onGiftClick(e){
  if(locked)return;
  /* ripple */
  const rect=giftWrap.getBoundingClientRect();
  const rip=document.createElement('div');
  rip.className='ripple';
  rip.style.width=rip.style.height=giftWrap.offsetWidth+'px';
  rip.style.left=(e.clientX-rect.left)+'px';
  rip.style.top=(e.clientY-rect.top)+'px';
  giftWrap.appendChild(rip);
  setTimeout(()=>rip.remove(),680);

  clicks++;
  barraFill.style.width=(clicks/MAX*100)+'%';

  numEl.classList.remove('bump');void numEl.offsetWidth;
  numEl.textContent=`${clicks} / ${MAX}`;
  numEl.classList.add('bump');

  giftWrap.classList.remove('shake');void giftWrap.offsetWidth;
  giftWrap.classList.add('shake');

  document.body.style.transform=`translate(${(Math.random()-0.5)*10}px,${(Math.random()-0.5)*10}px)`;
  setTimeout(()=>document.body.style.transform='',130);

  const fl=document.getElementById('flash');
  fl.style.opacity='0.08';setTimeout(()=>fl.style.opacity='0',180);

  const frases=[
    '— sigue… —','— ya mero… —','— dale más duro —',
    '— casi casi… —','— ya casi ya —','— un poco más —',
    '— aguanta —','— ya meritito —','— ¡un último! —','— ¡¡¡AHORA!!! —'
  ];
  hintEl.textContent=frases[Math.min(clicks-1,frases.length-1)];

  /* cada click sacude más el regalo */
  const giftEmoji=document.getElementById('gift-emoji');
  const intensity=clicks/MAX;
  giftEmoji.style.filter=`hue-rotate(${clicks*36}deg) drop-shadow(0 0 ${40+clicks*8}px #fff)`;

  if(clicks>=MAX){ locked=true; giftWrap.style.pointerEvents='none'; setTimeout(explotar,350); }
}

/* ── EXPLOSIÓN 10 SEGUNDOS ── */
function explotar(){
  /* 0s flash */
  const flash=document.getElementById('flash');
  flash.classList.add('boom');
  setTimeout(()=>flash.classList.remove('boom'),380);

  /* 0.1s zoom burst */
  setTimeout(()=>{
    const zb=document.getElementById('zoom-burst');
    zb.classList.add('go');
    setTimeout(()=>zb.classList.remove('go'),1200);
  },100);

  /* shockwaves durante 5s */
  [200,'#ff2d78'],[500,'#ffd700'],[800,'#00f5ff'],
  [1200,'#bf00ff'],[1700,'#ff6a00'],[2300,'#fff'],
  [3000,'#ff2d78'],[3800,'#ffd700'],[4600,'#00f5ff'],
  [5500,'#ffffff'].forEach(([t,c])=>shock(t,c));

  /* lasers 0.3s → 6s */
  [0,20,40,60,80,100,120,140,160,180,200,220,240,260,280,300,320,340].forEach((ang,i)=>{
    const cols=['#ff2d78','#ffd700','#00f5ff','#bf00ff','#ff6a00','#00ff88'];
    laser(ang,cols[i%cols.length],300+i*120);
    laser(ang,cols[(i+3)%cols.length],3500+i*110);
  });

  /* rainbow bg */
  setTimeout(()=>document.getElementById('rainbow-bg').classList.add('visible'),500);

  /* disco */
  setTimeout(()=>document.getElementById('disco').classList.add('visible'),600);

  /* partículas — 4 oleadas */
  setTimeout(()=>{
    pc.classList.add('visible');animating=true;
    spawnParts(480);drawParts();
  },600);
  setTimeout(()=>spawnParts(380),2500);
  setTimeout(()=>spawnParts(320),5000);
  setTimeout(()=>spawnParts(280),7500);

  /* strobe */
  setTimeout(()=>startStrobe(5000),800);

  /* lluvia emojis — 8 oleadas repartidas en 9s */
  [0,1000,2200,3400,4600,5800,7000,8200].forEach((t,i)=>{
    lluvia(60+i*4, 700+t);
  });

  /* textos voladores */
  const palabras=[
    ['🎉 BOOM 🎉','#ffd700'],['✨ WOW ✨','#00f5ff'],['🔥 FIRE 🔥','#ff6a00'],
    ['⭐ EPIC ⭐','#fff'],['💥 YEAH 💥','#ff2d78'],['🏆 TOP 🏆','#ffd700'],
    ['🌈 YAS 🌈','#00ff88'],['💎 LUJO 💎','#00f5ff'],['🥳 FIESTA 🥳','#bf00ff'],
    ['🎊 OMG 🎊','#ff2d78'],['🦄 MAGIC 🦄','#fff'],['❤️ LOVE ❤️','#ff69b4'],
    ['🍾 POP 🍾','#ffd700'],['🎆 BANG 🎆','#00f5ff'],['🌟 STAR 🌟','#fff'],
  ];
  palabras.forEach(([w,c],i)=>{
    flyWord(w,c,800+i*450);
    flyWord(w,c,5000+i*380);
  });

  /* ocultar escena */
  setTimeout(()=>{
    document.getElementById('scene').style.opacity='0';
    document.getElementById('scene').style.pointerEvents='none';
  },300);

  /* a los 9s: apagar fondo loco, mostrar panel */
  setTimeout(()=>{
    document.getElementById('rainbow-bg').classList.remove('visible');
    document.getElementById('disco').classList.remove('visible');
    document.getElementById('mensaje-panel').classList.add('visible');
  },9000);

  /* 9.5s: texto principal */
  setTimeout(()=>document.getElementById('mensaje-text').classList.add('show'),9500);

  /* 10.4s: subtítulo */
  setTimeout(()=>document.getElementById('sub-text').classList.add('show'),10400);

  /* 11.2s: botón */
  setTimeout(()=>document.getElementById('btn-volver').classList.add('show'),11200);
}

/* ── RESET ── */
function resetear(){
  clicks=0;locked=false;animating=false;parts=[];
  pctx.clearRect(0,0,pc.width,pc.height);
  pc.classList.remove('visible');
  document.getElementById('rainbow-bg').classList.remove('visible');
  document.getElementById('disco').classList.remove('visible');
  document.getElementById('flash').className='';
  document.getElementById('zoom-burst').classList.remove('go');
  document.getElementById('strobe').style.opacity='0';
  document.getElementById('mensaje-panel').classList.remove('visible');
  document.getElementById('mensaje-text').classList.remove('show');
  document.getElementById('sub-text').classList.remove('show');
  document.getElementById('btn-volver').classList.remove('show');
  barraFill.style.width='0%';
  numEl.textContent='0 / 10';
  hintEl.textContent='— toca el regalo —';
  document.getElementById('gift-emoji').style.filter='';
  const scene=document.getElementById('scene');
  scene.style.opacity='1';scene.style.pointerEvents='all';
  giftWrap.style.pointerEvents='all';
  giftWrap.classList.remove('shake');
  if(strobeTimer){clearInterval(strobeTimer);strobeTimer=null;}
}
</script>
</body>
</html>
